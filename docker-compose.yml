# =============================================================================
# Zero Trust IoMT - Docker Compose Stack
# =============================================================================
# Services:
#   iomt-gateway     FastAPI Zero Trust policy enforcement gateway
#   iomt-monitor     Anomaly detection + log analysis daemon
#   iomt-simulator   IoMT network traffic simulator (one-shot)
#   keycloak         Identity provider (IAM) — OIDC/OAuth2
#   postgres         Keycloak backing database
#   grafana          Dashboard for monitoring logs & metrics
#   loki             Log aggregation (Grafana Loki)
#   promtail         Log shipper (tails JSONL logs → Loki)
#
# Usage:
#   docker compose up -d                  # Start full stack
#   docker compose up iomt-gateway        # Start gateway only
#   docker compose run iomt-simulator     # Run simulation once
#   docker compose logs -f iomt-gateway   # Stream gateway logs
#   docker compose down -v                # Teardown + remove volumes
#
# Compliance: NIST SP 800-207 (Zero Trust), HIPAA §164.312
# =============================================================================

version: "3.9"

# ── Shared networks (micro-segmentation) ─────────────────────────────────────
networks:

  # Internal application network — policy engine ↔ gateway
  iomt_internal:
    driver: bridge
    internal: true          # No direct internet access
    ipam:
      config:
        - subnet: 172.20.10.0/24

  # IAM network — gateway ↔ Keycloak ↔ Postgres
  iomt_iam:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.20.0/24

  # Monitoring network — services → Loki → Grafana
  iomt_monitoring:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.30.0/24

  # External-facing network — only gateway and grafana expose ports here
  iomt_external:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24


# ── Persistent volumes ────────────────────────────────────────────────────────
volumes:
  iomt_logs:
    driver: local
  keycloak_data:
    driver: local
  postgres_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local


# ── Secrets (use Docker secrets in Swarm; env file in standalone) ─────────────
# In production, replace env vars with: secrets: [postgres_password]
# secrets:
#   postgres_password:
#     file: ./secrets/postgres_password.txt


# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ────────────────────────────────────────────────────────────────────────────
  # 1. Zero Trust API Gateway
  # ────────────────────────────────────────────────────────────────────────────
  iomt-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BUILD_DATE: "${BUILD_DATE:-unknown}"
        VCS_REF: "${VCS_REF:-unknown}"
    image: zero-trust-iomt:2.1.0
    container_name: iomt-gateway
    restart: unless-stopped
    read_only: true                 # Immutable filesystem (CIS 5.12)
    security_opt:
      - no-new-privileges:true      # Prevent privilege escalation (CIS 5.4)
      - seccomp:unconfined          # Replace with custom seccomp in prod
    cap_drop:
      - ALL                         # Drop all Linux capabilities (CIS 5.3)
    cap_add:
      - NET_BIND_SERVICE            # Allow binding to port 8000
    tmpfs:
      - /tmp:noexec,nosuid,size=64m # Writable temp (read-only fs workaround)
    volumes:
      - iomt_logs:/app/logs         # Persist logs outside container
      - type: bind
        source: ../iam/rbac_config.json
        target: /app/iam/rbac_config.json
        read_only: true
    networks:
      iomt_internal:
        ipv4_address: 172.20.10.10
      iomt_iam:
        ipv4_address: 172.20.20.10
      iomt_external:
        ipv4_address: 172.20.0.10
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      LOG_LEVEL: INFO
      LOG_DIR: /app/logs
      POLICY_STRICT_MODE: "true"
      AUTH_TOKEN_TTL: "3600"
      KEYCLOAK_URL: "http://172.20.20.20:8080"
      KEYCLOAK_REALM: iomt-zerotrust
      KEYCLOAK_CLIENT_ID: iomt-gateway
      KEYCLOAK_CLIENT_SECRET: "${KEYCLOAK_CLIENT_SECRET:-changeme-in-production}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      keycloak:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      com.iomt.service: "gateway"
      com.iomt.version: "2.1.0"
      com.iomt.compliance: "HIPAA,NIST-ZTA"

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Anomaly Detection + Monitoring Daemon
  # ────────────────────────────────────────────────────────────────────────────
  iomt-monitor:
    image: zero-trust-iomt:2.1.0
    container_name: iomt-monitor
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    volumes:
      - iomt_logs:/app/logs
    networks:
      iomt_internal:
        ipv4_address: 172.20.10.11
      iomt_monitoring:
        ipv4_address: 172.20.30.11
    environment:
      APP_ENV: production
      LOG_DIR: /app/logs
      ANOMALY_CHECK_INTERVAL: "60"    # Seconds between analysis runs
      ANOMALY_ALERT_THRESHOLD: "medium"
    # Override CMD to run anomaly detector in watch mode
    command: >
      python -c "
      import time, sys
      sys.path.insert(0, '/app')
      from monitoring.anomaly_detection import IoMTAnomalyDetector
      detector = IoMTAnomalyDetector('/app/logs/iomt_events.jsonl')
      print('[MONITOR] Anomaly detection daemon started', flush=True)
      while True:
          try:
              detector.analyze_log_file()
              alerts = detector.export_alerts('/app/logs/alerts.json')
              print(f'[MONITOR] Analysis cycle complete. Alerts: {len(detector.alerts)}', flush=True)
          except Exception as e:
              print(f'[MONITOR] Error: {e}', flush=True)
          time.sleep(60)
      "
    depends_on:
      - iomt-gateway
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # 3. IoMT Traffic Simulator (one-shot container)
  # ────────────────────────────────────────────────────────────────────────────
  iomt-simulator:
    image: zero-trust-iomt:2.1.0
    container_name: iomt-simulator
    # restart: no — run once, then exit
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    volumes:
      - iomt_logs:/app/logs
    networks:
      iomt_internal:
        ipv4_address: 172.20.10.12
    environment:
      LOG_DIR: /app/logs
    command: python simulation/iomt_sim.py --mode full
    depends_on:
      iomt-gateway:
        condition: service_healthy
    profiles:
      - simulation          # Only start with: docker compose --profile simulation up

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Keycloak Identity Provider
  # ────────────────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    container_name: iomt-keycloak
    restart: unless-stopped
    command:
      - start-dev                   # Use 'start' in production (requires TLS)
      - --http-port=8080
      - --hostname-strict=false
      - --log-level=INFO
    environment:
      # Admin credentials — override via .env file in production
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-changeme123!}"
      # Database
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/keycloak"
      KC_DB_USERNAME: "${POSTGRES_USER:-keycloak}"
      KC_DB_PASSWORD: "${POSTGRES_PASSWORD:-keycloak_secret}"
      # Proxy
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      iomt_iam:
        ipv4_address: 172.20.20.20
      iomt_external:
        ipv4_address: 172.20.0.20
    ports:
      - "8080:8080"       # Keycloak admin console
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # 5. PostgreSQL (Keycloak backend)
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: iomt-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: "${POSTGRES_USER:-keycloak}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-keycloak_secret}"
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      iomt_iam:
        ipv4_address: 172.20.20.30
    # Do NOT expose port 5432 externally
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak} -d keycloak"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # 6. Grafana (Monitoring Dashboard)
  # ────────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: iomt-grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-iomt_admin}"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Pre-configure Loki datasource
      GF_INSTALL_PLUGINS: "grafana-clock-panel"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      iomt_monitoring:
        ipv4_address: 172.20.30.20
      iomt_external:
        ipv4_address: 172.20.0.30
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # 7. Loki (Log Aggregation)
  # ────────────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: iomt-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      iomt_monitoring:
        ipv4_address: 172.20.30.30
    # Loki not exposed externally — Grafana queries it internally
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # 8. Promtail (Log Shipper: JSONL logs → Loki)
  # ────────────────────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.4
    container_name: iomt-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - iomt_logs:/var/log/iomt:ro   # Read-only access to app logs
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    networks:
      iomt_monitoring:
        ipv4_address: 172.20.30.40
    environment:
      LOKI_URL: "http://172.20.30.30:3100/loki/api/v1/push"
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
